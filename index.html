<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Fresco — Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="banner" class="banner hidden"></div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Editar tarea</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-form">
                <label>Nombre de la tarea</label>
                <input type="text" id="editText" placeholder="Nombre de la tarea">

                <div class="form-row">
                    <div>
                        <label>Artista / Evento</label>
                        <select id="editArtist">
                            <option value="">— General —</option>
                            <option value="Pirlo">Pirlo</option>
                            <option value="Lucho SSJ">Lucho SSJ</option>
                            <option value="Akapellah">Akapellah</option>
                            <option value="Big Soto">Big Soto</option>
                            <option value="Tussiwarrios">Tussiwarrios</option>
                            <option value="Kase.O">Kase.O</option>
                        </select>
                    </div>
                    <div>
                        <label>Responsable</label>
                        <select id="editAssigned">
                            <option value="">— Sin asignar —</option>
                            <option value="Cristian">Cristian</option>
                            <option value="Andrés">Andrés</option>
                            <option value="Ignacio">Ignacio</option>
                            <option value="Felipe">Felipe</option>
                            <option value="Fabian">Fabian</option>
                            <option value="Diego">Diego</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Categoría</label>
                        <select id="editCategory">
                            <option value="">— Sin categoría —</option>
                            <option value="Producción">Producción</option>
                            <option value="Logística">Logística</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Artistas">Artistas</option>
                            <option value="Finanzas">Finanzas</option>
                        </select>
                    </div>
                    <div>
                        <label>Prioridad</label>
                        <select id="editPriority">
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                </div>

                <label>Fecha de vencimiento</label>
                <input type="date" id="editDate">

                <label>Notas</label>
                <textarea id="editNotes" placeholder="Notas (opcional)"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="saveEdit()">Guardar cambios</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <img src="logo.png" alt="Old Fresco" class="logo">
        <div class="header-text">
            <h1>Gestor de Tareas</h1>
            <p class="header-sub">Old Fresco — San José, Costa Rica</p>
        </div>
    </div>

    <div class="container">

        <!-- Resumen -->
        <div id="summary" class="summary"></div>

        <!-- Formulario -->
        <details class="form-wrapper">
            <summary class="form-toggle">+ Nueva tarea</summary>
            <div class="task-form">
                <label>Nombre de la tarea *</label>
                <input type="text" id="taskInput" placeholder="¿Qué hay que hacer?">

                <div class="form-row">
                    <div>
                        <label>Artista / Evento</label>
                        <select id="artistInput">
                            <option value="">— General —</option>
                            <option value="Pirlo">Pirlo</option>
                            <option value="Lucho SSJ">Lucho SSJ</option>
                            <option value="Akapellah">Akapellah</option>
                            <option value="Big Soto">Big Soto</option>
                            <option value="Tussiwarrios">Tussiwarrios</option>
                            <option value="Kase.O">Kase.O</option>
                        </select>
                    </div>
                    <div>
                        <label>Responsable</label>
                        <select id="assignedInput">
                            <option value="">— Sin asignar —</option>
                            <option value="Cristian">Cristian</option>
                            <option value="Andrés">Andrés</option>
                            <option value="Ignacio">Ignacio</option>
                            <option value="Felipe">Felipe</option>
                            <option value="Fabian">Fabian</option>
                            <option value="Diego">Diego</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Categoría</label>
                        <select id="categoryInput">
                            <option value="">— Sin categoría —</option>
                            <option value="Producción">Producción</option>
                            <option value="Logística">Logística</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Artistas">Artistas</option>
                            <option value="Finanzas">Finanzas</option>
                        </select>
                    </div>
                    <div>
                        <label>Prioridad</label>
                        <select id="priorityInput">
                            <option value="Media">Media</option>
                            <option value="Alta">Alta</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                </div>

                <label>Fecha de vencimiento</label>
                <input type="date" id="dateInput">

                <label>Notas</label>
                <textarea id="notesInput" placeholder="Detalles, links, contactos..."></textarea>

                <button class="btn-add" onclick="addTask()">Agregar tarea</button>
            </div>
        </details>

        <!-- Filtros -->
        <div class="filters-wrapper">
            <button class="filters-toggle" onclick="toggleFilters()">Filtros</button>
            <div id="filtersPanel" class="filters-panel hidden">
                <div class="filter-group">
                    <span class="filter-label">Artista</span>
                    <select id="filterArtist" onchange="applyFilters()">
                        <option value="todos">Todos</option>
                        <option value="">General</option>
                        <option value="Pirlo">Pirlo</option>
                        <option value="Lucho SSJ">Lucho SSJ</option>
                        <option value="Akapellah">Akapellah</option>
                        <option value="Big Soto">Big Soto</option>
                        <option value="Tussiwarrios">Tussiwarrios</option>
                        <option value="Kase.O">Kase.O</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Responsable</span>
                    <select id="filterPersona" onchange="applyFilters()">
                        <option value="todos">Todos</option>
                        <option value="Cristian">Cristian</option>
                        <option value="Andrés">Andrés</option>
                        <option value="Ignacio">Ignacio</option>
                        <option value="Felipe">Felipe</option>
                        <option value="Fabian">Fabian</option>
                        <option value="Diego">Diego</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Categoría</span>
                    <select id="filterCategoria" onchange="applyFilters()">
                        <option value="todos">Todas</option>
                        <option value="Producción">Producción</option>
                        <option value="Logística">Logística</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Artistas">Artistas</option>
                        <option value="Finanzas">Finanzas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Prioridad</span>
                    <select id="filterPrioridad" onchange="applyFilters()">
                        <option value="todos">Todas</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>
                <button class="clear-filters" onclick="clearFilters()">Limpiar</button>
            </div>
        </div>

        <!-- Lista agrupada -->
        <div id="taskList"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
