<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Fresco — Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="banner" class="banner hidden"></div>

    <!-- Modal de edición -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Editar tarea</h2>
            <div class="modal-form">
                <label>Nombre de la tarea</label>
                <input type="text" id="editText" placeholder="Nombre de la tarea">

                <label>Responsable</label>
                <select id="editAssigned">
                    <option value="">— Sin asignar —</option>
                    <option value="Cristian">Cristian</option>
                    <option value="Andrés">Andrés</option>
                    <option value="Ignacio">Ignacio</option>
                    <option value="Felipe">Felipe</option>
                    <option value="Fabian">Fabian</option>
                    <option value="Diego">Diego</option>
                </select>

                <label>Categoría</label>
                <select id="editCategory">
                    <option value="">— Sin categoría —</option>
                    <option value="Producción">Producción</option>
                    <option value="Logística">Logística</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Artistas">Artistas</option>
                    <option value="Finanzas">Finanzas</option>
                </select>

                <label>Prioridad</label>
                <select id="editPriority">
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>

                <label>Fecha de vencimiento</label>
                <input type="date" id="editDate">

                <label>Notas</label>
                <textarea id="editNotes" placeholder="Notas (opcional)"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="saveEdit()">Guardar</button>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <img src="logo.png" alt="Old Fresco" class="logo">
            <h1>Gestor de Tareas</h1>
        </div>

        <!-- Resumen -->
        <div id="summary" class="summary"></div>

        <!-- Formulario -->
        <div class="task-form">
            <input type="text" id="taskInput" placeholder="Nombre de la tarea">

            <select id="assignedInput">
                <option value="">— Responsable —</option>
                <option value="Cristian">Cristian</option>
                <option value="Andrés">Andrés</option>
                <option value="Ignacio">Ignacio</option>
                <option value="Felipe">Felipe</option>
                <option value="Fabian">Fabian</option>
                <option value="Diego">Diego</option>
            </select>

            <select id="categoryInput">
                <option value="">— Categoría —</option>
                <option value="Producción">Producción</option>
                <option value="Logística">Logística</option>
                <option value="Marketing">Marketing</option>
                <option value="Artistas">Artistas</option>
                <option value="Finanzas">Finanzas</option>
            </select>

            <select id="priorityInput">
                <option value="Media">Prioridad: Media</option>
                <option value="Alta">Prioridad: Alta</option>
                <option value="Baja">Prioridad: Baja</option>
            </select>

            <input type="date" id="dateInput">

            <textarea id="notesInput" placeholder="Notas (opcional)"></textarea>

            <button onclick="addTask()">Agregar tarea</button>
        </div>

        <!-- Filtros colapsables -->
        <div class="filters-wrapper">
            <button class="filters-toggle" onclick="toggleFilters()">▼ Filtros</button>
            <div id="filtersPanel" class="filters-panel hidden">
                <div class="filter-group">
                    <span class="filter-label">Responsable</span>
                    <select id="filterPersona" onchange="applyFilters()">
                        <option value="todos">Todos</option>
                        <option value="Cristian">Cristian</option>
                        <option value="Andrés">Andrés</option>
                        <option value="Ignacio">Ignacio</option>
                        <option value="Felipe">Felipe</option>
                        <option value="Fabian">Fabian</option>
                        <option value="Diego">Diego</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Categoría</span>
                    <select id="filterCategoria" onchange="applyFilters()">
                        <option value="todos">Todas</option>
                        <option value="Producción">Producción</option>
                        <option value="Logística">Logística</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Artistas">Artistas</option>
                        <option value="Finanzas">Finanzas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Prioridad</span>
                    <select id="filterPrioridad" onchange="applyFilters()">
                        <option value="todos">Todas</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>
                <button class="clear-filters" onclick="clearFilters()">Limpiar filtros</button>
            </div>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
